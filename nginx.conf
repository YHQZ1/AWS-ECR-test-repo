server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Critical for React routing
        try_files $uri /index.html;
    }

    # Optional: cache static assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}